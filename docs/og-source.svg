<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="40%" stop-color="#1a1028"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b2c" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#ff2d95" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5c8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="vi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b2c"/>
      <stop offset="45%" stop-color="#ff2d95"/>
      <stop offset="100%" stop-color="#00e5c8"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b2c"/>
      <stop offset="50%" stop-color="#ff2d95"/>
      <stop offset="100%" stop-color="#00e5c8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(0,229,200,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#sunset)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Palm silhouettes -->
  <g fill="#0d1520" opacity="0.9">
    <ellipse cx="80" cy="680" rx="120" ry="280"/>
    <ellipse cx="1120" cy="700" rx="140" ry="300"/>
    <path d="M 60 630 Q 30 420 90 280 Q 110 200 70 120 L 95 120 Q 130 220 115 350 Q 100 500 80 630 Z"/>
    <path d="M 1140 630 Q 1170 400 1100 260 Q 1080 180 1120 100 L 1095 100 Q 1060 210 1075 340 Q 1090 490 1110 630 Z"/>
  </g>

  <!-- Neon horizon line -->
  <path d="M 0 520 Q 300 480 600 500 Q 900 520 1200 490" fill="none" stroke="rgba(0,229,200,0.35)" stroke-width="2" filter="url(#glow)"/>
  <path d="M 0 530 Q 400 510 600 525 Q 800 540 1200 515" fill="none" stroke="rgba(255,45,149,0.25)" stroke-width="1.5"/>

  <!-- Accent bars -->
  <rect x="80" y="80" width="4" height="48" fill="url(#bar)" opacity="0.9"/>
  <rect x="1116" y="502" width="4" height="48" fill="url(#bar)" opacity="0.9"/>

  <!-- Brand -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" letter-spacing="18" fill="rgba(232,237,245,0.55)">OFFICIAL INTERACTIVE</text>

  <text x="600" y="360" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="118" font-weight="900" letter-spacing="4" fill="#e8edf5" filter="url(#glow)">
    <tspan>GTA </tspan><tspan fill="url(#vi)">VI MAP</tspan>
  </text>

  <text x="600" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" letter-spacing="10" fill="#00e5c8" opacity="0.85">INTERACTIVE GUIDE</text>

  <!-- Tagline box -->
  <rect x="300" y="470" width="600" height="72" rx="4" fill="rgba(10,14,23,0.75)" stroke="rgba(255,45,149,0.35)" stroke-width="1"/>
  <text x="600" y="505" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(232,237,245,0.75)">Explore Vice City — launching November 19, 2026</text>
  <text x="600" y="535" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="rgba(232,237,245,0.45)">Collectibles · Missions · Secrets · Community Map</text>

  <!-- Bottom URL -->
  <text x="600" y="590" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" letter-spacing="4" fill="rgba(0,229,200,0.5)">jyounggsts.github.io/GTAVIMap</text>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.15"/>
  <rect width="1200" height="630" fill="none" style="mix-blend-mode:overlay">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>